<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnFlow - টাস্ক</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e17; color: #e0e6f0;
            font-family: Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 16px;
        }
        .card {
            background: #131a2b; border-radius: 16px;
            padding: 24px; width: 100%; max-width: 360px; text-align: center;
        }
        .icon { font-size: 48px; margin-bottom: 8px; }
        h2 { font-size: 18px; margin-bottom: 4px; }
        .reward { color: #00d4aa; font-weight: bold; margin-bottom: 10px; }
        .info {
            display: flex; justify-content: space-between;
            background: #1a2340; padding: 10px 14px;
            border-radius: 10px; margin-bottom: 14px; font-size: 13px;
        }
        .info span { color: #00d4aa; font-weight: bold; }
        .timer-circle {
            width: 90px; height: 90px; border-radius: 50%;
            border: 5px solid #1e2d44; margin: 0 auto 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; font-weight: bold;
        }
        .btn {
            display: block; width: 100%; padding: 14px;
            border: none; border-radius: 12px;
            font-size: 16px; font-weight: bold; margin-bottom: 10px; cursor: pointer;
        }
        .ad-btn { background: #6366f1; color: white; }
        .claim-btn { background: #00d4aa; color: #0a0e17; }
        .claim-btn:disabled { background: #2d3548; color: #5a6478; }
        .join-btn { background: #ffa502; color: #0a0e17; }
        .msg {
            margin-top: 12px; font-size: 14px;
            padding: 10px; border-radius: 8px; display: none;
        }
        .msg.show { display: block; }
        .success { background: rgba(0, 212, 170, 0.2); color: #00d4aa; }
        .error { background: rgba(255, 71, 87, 0.2); color: #ff4757; }
        .hidden { display: none; }
        .channel-list { text-align: left; margin-bottom: 16px; }
        .channel-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px; background: #1a2340;
            border-radius: 10px; margin-bottom: 8px;
        }
        .channel-item a { color: #6366f1; text-decoration: none; flex: 1; text-align: left; }
        .loading-text { color: #8892a4; font-size: 14px; margin-top: 12px; }
    </style>
</head>
<body>
    <!-- Channel Join Screen -->
    <div class="card" id="joinScreen">
        <div class="icon">🔒</div>
        <h2>চ্যানেলে জয়েন করুন</h2>
        <p style="color:#8892a4; margin-bottom:14px; font-size:14px;">টাস্ক করতে চ্যানেলে জয়েন করুন</p>
        <div class="channel-list" id="channelList"></div>
        <button class="btn join-btn" id="verifyBtn">✅ জয়েন করেছি</button>
        <div class="msg" id="joinMsg"></div>
    </div>

    <!-- Task Screen -->
    <div class="card" id="taskScreen">
        <div class="icon" id="taskIcon">📺</div>
        <h2 id="taskTitle">টাস্ক</h2>
        <p class="reward" id="taskReward">💰 $0.00</p>
        
        <div class="info">
            <div>💰 ব্যালেন্স<br><span id="userBalance">লোডিং...</span></div>
            <div>📊 আজ বাকি<br><span id="taskRemaining">লোডিং...</span></div>
        </div>

        <div class="timer-circle" id="timer">১৫</div>
        <button class="btn ad-btn" id="adBtn">🔗 অ্যাড দেখুন</button>
        <button class="btn claim-btn" id="claimBtn" disabled>🎁 রিওয়ার্ড নিন</button>
        <div class="msg" id="msg"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const BASE_URL = 'https://earnflow-bot.vercel.app';
        const userId = tg.initDataUnsafe?.user?.id;

        // Get task data from URL
        const urlParams = new URLSearchParams(window.location.search);
        const taskDataEncoded = urlParams.get('data');
        let taskData = null;
        try {
            if (taskDataEncoded) taskData = JSON.parse(decodeURIComponent(taskDataEncoded));
        } catch(e) {}

        console.log('User ID:', userId);
        console.log('Task Data:', taskData);

        // Elements
        const joinScreen = document.getElementById('joinScreen');
        const taskScreen = document.getElementById('taskScreen');
        const channelList = document.getElementById('channelList');
        const verifyBtn = document.getElementById('verifyBtn');
        const joinMsg = document.getElementById('joinMsg');

        // Load data on start
        async function init() {
            try {
                console.log('Checking channels...');
                const checkRes = await fetch(`${BASE_URL}/api/webhook?action=check_join&user_id=${userId}`);
                const checkData = await checkRes.json();
                console.log('Check result:', checkData);

                if (!checkData.joined) {
                    console.log('Not joined, loading channels...');
                    const chRes = await fetch(`${BASE_URL}/api/webhook?action=get_channels`);
                    const chData = await chRes.json();
                    
                    channelList.innerHTML = '';
                    if (chData.channels) {
                        chData.channels.forEach(ch => {
                            const link = ch.invite_link || 'https://t.me/' + (ch.channel_id || '').toString().replace('-100', '');
                            channelList.innerHTML += `
                                <div class="channel-item">
                                    <span>📢</span>
                                    <a href="${link}" target="_blank">${ch.channel_name || 'চ্যানেল'}</a>
                                </div>
                            `;
                        });
                    }
                    joinScreen.classList.remove('hidden');
                    taskScreen.classList.add('hidden');
                    return;
                }

                // Already joined - load user data
                console.log('Joined! Loading user data...');
                const userRes = await fetch(`${BASE_URL}/api/webhook?action=get_user&user_id=${userId}`);
                const userData = await userRes.json();
                console.log('User data:', userData);

                document.getElementById('userBalance').textContent = '$' + (userData.balance || 0).toFixed(2);

                // Task info
                if (taskData) {
                    document.getElementById('taskTitle').textContent = taskData.title || 'টাস্ক';
                    document.getElementById('taskReward').textContent = '💰 $' + (taskData.reward || '0');
                    document.getElementById('taskIcon').textContent = taskData.icon || '📺';

                    // Get remaining
                    const remRes = await fetch(`${BASE_URL}/api/webhook?action=task_remaining&user_id=${userId}&task_id=${taskData.task_id}`);
                    const remData = await remRes.json();
                    console.log('Remaining:', remData);
                    document.getElementById('taskRemaining').textContent = (remData.remaining || 0) + '/' + (remData.daily_limit || 10);
                }

                joinScreen.classList.add('hidden');
                taskScreen.classList.remove('hidden');

            } catch(e) {
                console.error('Init error:', e);
                // Show task anyway
                if (taskData) {
                    document.getElementById('taskTitle').textContent = taskData.title || 'টাস্ক';
                    document.getElementById('taskReward').textContent = '💰 $' + (taskData.reward || '0');
                    document.getElementById('taskIcon').textContent = taskData.icon || '📺';
                }
                document.getElementById('userBalance').textContent = '$0.00';
                document.getElementById('taskRemaining').textContent = '-';
                joinScreen.classList.add('hidden');
                taskScreen.classList.remove('hidden');
            }
        }

        // Verify Join Button
        verifyBtn.addEventListener('click', async () => {
            verifyBtn.textContent = '⏳ চেক করা হচ্ছে...';
            verifyBtn.disabled = true;

            try {
                const checkRes = await fetch(`${BASE_URL}/api/webhook?action=check_join&user_id=${userId}`);
                const checkData = await checkRes.json();

                if (checkData.joined) {
                    joinMsg.className = 'msg show success';
                    joinMsg.textContent = '✅ ভেরিফাইড!';
                    setTimeout(() => init(), 600);
                } else {
                    joinMsg.className = 'msg show error';
                    joinMsg.textContent = '❌ এখনো জয়েন করেননি!';
                    verifyBtn.textContent = '✅ জয়েন করেছি';
                    verifyBtn.disabled = false;
                }
            } catch(e) {
                joinMsg.className = 'msg show error';
                joinMsg.textContent = '❌ এরর! আবার চেষ্টা করুন।';
                verifyBtn.textContent = '✅ জয়েন করেছি';
                verifyBtn.disabled = false;
            }
        });

        // ============ TASK ============
        const adBtn = document.getElementById('adBtn');
        const claimBtn = document.getElementById('claimBtn');
        const timerEl = document.getElementById('timer');
        const msgEl = document.getElementById('msg');
        let countdown;

        adBtn.addEventListener('click', () => {
            const adLink = taskData?.ad_link || 'https://google.com';
            window.open(adLink, '_blank');
            
            let sec = 15;
            adBtn.disabled = true;
            adBtn.style.opacity = '0.5';
            timerEl.textContent = sec;
            msgEl.className = 'msg show success';
            msgEl.textContent = '⏳ ১৫ সেকেন্ড অপেক্ষা করুন...';

            countdown = setInterval(() => {
                sec--;
                timerEl.textContent = sec;
                if (sec <= 0) {
                    clearInterval(countdown);
                    claimBtn.disabled = false;
                    timerEl.textContent = '✓';
                    msgEl.textContent = '✅ এখন রিওয়ার্ড নিতে পারেন!';
                }
            }, 1000);
        });

        claimBtn.addEventListener('click', async () => {
    claimBtn.textContent = '⏳ পাঠানো হচ্ছে...';
    claimBtn.disabled = true;
    msgEl.className = 'msg show success';
    msgEl.textContent = '⏳ রিওয়ার্ড পাঠানো হচ্ছে...';

    try {
        const res = await fetch(`${BASE_URL}/api/webhook`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                action: 'claim_task', 
                user_id: userId, 
                task_id: taskData?.task_id 
            })
        });
        
        const result = await res.json();
        console.log('Claim result:', result);
        
        if (result.success) {
            claimBtn.textContent = '✅ সম্পন্ন!';
            msgEl.className = 'msg show success';
            msgEl.textContent = `🎉 $${result.reward} যোগ হয়েছে!`;
            document.getElementById('userBalance').textContent = '$' + result.new_balance.toFixed(2);
        } else {
            claimBtn.textContent = '❌ ব্যর্থ!';
            msgEl.className = 'msg show error';
            msgEl.textContent = result.message || '❌ এরর!';
            claimBtn.disabled = false;
        }
    } catch(e) {
        console.error('Claim error:', e);
        claimBtn.textContent = '❌ এরর!';
        msgEl.className = 'msg show error';
        msgEl.textContent = '❌ নেটওয়ার্ক এরর!';
        claimBtn.disabled = false;
    }

    tg.HapticFeedback.notification('success');
    setTimeout(() => tg.close(), 2000);
});

        // Start
        init();
    </script>
</body>
</html>
