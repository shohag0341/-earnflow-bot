<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnFlow</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0e17;color:#e0e6f0;font-family:Arial;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:16px}
        .card{background:#131a2b;border-radius:16px;padding:24px;width:100%;max-width:360px;text-align:center}
        .icon{font-size:48px;margin-bottom:8px}
        h2{font-size:18px;margin-bottom:4px}
        .reward{color:#00d4aa;font-weight:bold;margin-bottom:10px}
        .info{display:flex;justify-content:space-between;background:#1a2340;padding:10px 14px;border-radius:10px;margin-bottom:14px;font-size:13px}
        .info span{color:#00d4aa;font-weight:bold}
        .timer-big{font-size:72px;font-weight:bold;color:#00d4aa;margin:20px 0}
        .btn{display:block;width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:bold;margin-bottom:10px;cursor:pointer}
        .ad-btn{background:#6366f1;color:white}
        .claim-btn{background:#00d4aa;color:#0a0e17}
        .claim-btn:disabled{background:#2d3548;color:#5a6478;cursor:not-allowed}
        .join-btn{background:#ffa502;color:#0a0e17}
        .cross-btn{background:#ff4757;color:white;font-size:20px}
        .msg{margin-top:12px;font-size:14px;padding:10px;border-radius:8px;display:none}
        .msg.show{display:block}
        .success{background:rgba(0,212,170,0.2);color:#00d4aa}
        .error{background:rgba(255,71,87,0.2);color:#ff4757}
        .hidden{display:none}
        .channel-list{text-align:left;margin-bottom:16px}
        .channel-item{display:flex;align-items:center;gap:10px;padding:10px;background:#1a2340;border-radius:10px;margin-bottom:8px}
        .channel-item a{color:#6366f1;text-decoration:none;flex:1}
    </style>
</head>
<body>

    <div class="card hidden" id="joinScreen">
        <div class="icon">🔒</div>
        <h2>চ্যানেলে জয়েন করুন</h2>
        <p style="color:#8892a4;margin-bottom:14px;font-size:14px">টাস্ক করতে চ্যানেলে জয়েন করুন</p>
        <div class="channel-list" id="channelList"></div>
        <button class="btn join-btn" id="verifyBtn">✅ জয়েন করেছি</button>
        <div class="msg" id="joinMsg"></div>
    </div>

    <div class="card hidden" id="taskScreen">
        <div class="icon" id="taskIcon">📺</div>
        <h2 id="taskTitle">টাস্ক</h2>
        <p class="reward" id="taskReward">💰 $0.00</p>
        <div class="info">
            <div>💰 ব্যালেন্স<br><span id="userBalance">$0.00</span></div>
            <div>📊 আজ বাকি<br><span id="taskRemaining">-</span></div>
        </div>
        <button class="btn ad-btn" id="adBtn">🔗 অ্যাড দেখুন</button>
        <button class="btn claim-btn" id="claimBtn" disabled>🎁 রিওয়ার্ড নিন</button>
        <div class="msg" id="msg"></div>
    </div>

    <div class="card hidden" id="timerScreen">
        <div class="icon">⏳</div>
        <h2>অপেক্ষা করুন</h2>
        <p style="color:#8892a4;margin-bottom:10px">অ্যাড দেখার পর অপেক্ষা করুন</p>
        <div class="timer-big" id="timerBig">১৫</div>
        <button class="btn cross-btn hidden" id="crossBtn">✕ বন্ধ করুন</button>
        <div class="msg" id="timerMsg"></div>
    </div>

    <script>
        (function(){
            var tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();

            var BASE = 'https://earnflow-bot.vercel.app';
            var uid = tg.initDataUnsafe?.user?.id;
            var taskData = null;

            try {
                var p = new URLSearchParams(location.search);
                var d = p.get('data');
                if (d) taskData = JSON.parse(decodeURIComponent(d));
            } catch(e) {}

            function show(id) {
                document.getElementById('joinScreen').classList.add('hidden');
                document.getElementById('taskScreen').classList.add('hidden');
                document.getElementById('timerScreen').classList.add('hidden');
                document.getElementById(id).classList.remove('hidden');
            }

            async function init(){
                try {
                    var jr = await fetch(`${BASE}/api/webhook?action=check_join&user_id=${uid}`);
                    var jd = await jr.json();
                    if(!jd.joined){
                        var cr = await fetch(`${BASE}/api/webhook?action=get_channels`);
                        var cd = await cr.json();
                        document.getElementById('channelList').innerHTML = '';
                        if(cd.channels) cd.channels.forEach(function(c){
                            var l = c.invite_link || 'https://t.me/'+(c.channel_id||'').toString().replace('-100','');
                            document.getElementById('channelList').innerHTML += '<div class="channel-item"><span>📢</span><a href="'+l+'" target="_blank">'+ (c.channel_name||'চ্যানেল') +'</a></div>';
                        });
                        show('joinScreen');
                        return;
                    }
                    var ur = await fetch(`${BASE}/api/webhook?action=get_user&user_id=${uid}`);
                    var ud = await ur.json();
                    document.getElementById('userBalance').textContent = '$' + (ud.balance||0).toFixed(2);
                    
                    if(taskData){
                        document.getElementById('taskIcon').textContent = taskData.icon||'📺';
                        document.getElementById('taskTitle').textContent = taskData.title||'টাস্ক';
                        document.getElementById('taskReward').textContent = '💰 $'+(taskData.reward||'0');
                        var rr = await fetch(`${BASE}/api/webhook?action=task_remaining&user_id=${uid}&task_id=${taskData.task_id}`);
                        var rd = await rr.json();
                        document.getElementById('taskRemaining').textContent = (rd.remaining||0)+'/'+(rd.daily_limit||10);

                        // Check if timer was already completed
                        var timerKey = 'earnflow_timer_' + taskData.task_id;
                        if (localStorage.getItem(timerKey) === 'done') {
                            document.getElementById('claimBtn').disabled = false;
                        } else {
                            document.getElementById('claimBtn').disabled = true;
                        }
                    }
                    show('taskScreen');
                } catch(e){
                    if(taskData){
                        document.getElementById('taskIcon').textContent = taskData.icon||'📺';
                        document.getElementById('taskTitle').textContent = taskData.title||'টাস্ক';
                        document.getElementById('taskReward').textContent = '💰 $'+(taskData.reward||'0');
                    }
                    show('taskScreen');
                }
            }

            document.getElementById('verifyBtn').addEventListener('click', async function(){
                var b = document.getElementById('verifyBtn');
                b.textContent = '⏳'; b.disabled = true;
                var r = await fetch(`${BASE}/api/webhook?action=check_join&user_id=${uid}`);
                var d = await r.json();
                if(d.joined){
                    document.getElementById('joinMsg').className = 'msg show success';
                    document.getElementById('joinMsg').textContent = '✅';
                    setTimeout(init, 600);
                } else {
                    document.getElementById('joinMsg').className = 'msg show error';
                    document.getElementById('joinMsg').textContent = '❌';
                    b.textContent = '✅ জয়েন করেছি'; b.disabled = false;
                }
            });

            document.getElementById('adBtn').addEventListener('click', function(){
                var adLink = taskData?.ad_link || 'https://google.com';
                window.open(adLink, '_blank');
                
                show('timerScreen');
                document.getElementById('crossBtn').classList.add('hidden');
                document.getElementById('timerMsg').className = 'msg hidden';

                var sec = 15;
                document.getElementById('timerBig').textContent = sec;

                var interval = setInterval(function(){
                    sec--;
                    document.getElementById('timerBig').textContent = sec;

                    if (sec <= 0) {
                        clearInterval(interval);
                        document.getElementById('timerBig').textContent = '✓';
                        document.getElementById('crossBtn').classList.remove('hidden');
                        document.getElementById('timerMsg').className = 'msg show success';
                        document.getElementById('timerMsg').textContent = 'এখন বন্ধ করে রিওয়ার্ড নিন!';

                        // Save timer state
                        if (taskData) {
                            localStorage.setItem('earnflow_timer_' + taskData.task_id, 'done');
                        }
                    }
                }, 1000);
            });

            document.getElementById('crossBtn').addEventListener('click', function(){
                init();
            });

            document.getElementById('claimBtn').addEventListener('click', async function(){
                var btn = this;
                btn.textContent = '⏳...';
                btn.disabled = true;

                try {
                    var response = await fetch(`${BASE}/api/webhook`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({action:'claim_task', user_id: uid, task_id: taskData?.task_id})
                    });
                    var text = await response.text();
                    var result = null;
                    try { result = JSON.parse(text); } catch(e) {}

                    if (result && result.success) {
                        btn.textContent = '✅ সম্পন্ন!';
                        document.getElementById('msg').className = 'msg show success';
                        document.getElementById('msg').textContent = '🎉 +$'+result.reward+' যোগ হয়েছে!';
                        document.getElementById('userBalance').textContent = '$'+result.new_balance.toFixed(2);
                        tg.HapticFeedback.notification('success');

                        // Clear timer state
                        if (taskData) {
                            localStorage.removeItem('earnflow_timer_' + taskData.task_id);
                        }

                        btn.onclick = null;
                        setTimeout(function(){ tg.close(); }, 2000);
                    } else {
                        btn.textContent = '🎁 রিওয়ার্ড নিন';
                        btn.disabled = false;
                        document.getElementById('msg').className = 'msg show error';
                        document.getElementById('msg').textContent = (result && result.message) || 'লিমিট শেষ!';
                    }
                } catch(e) {
                    btn.textContent = '🎁 রিওয়ার্ড নিন';
                    btn.disabled = false;
                }
            });

            init();
        })();
    </script>
</body>
</html>
